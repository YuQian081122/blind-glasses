; AI 智慧導盲眼鏡 ESP32 韌體
; 開發板: Seeed XIAO ESP32-S3 Sense (OV3660)

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

; 韌體選項
board_build.filesystem = littlefs

; PSRAM (OCTAL for XIAO ESP32-S3 Sense)
board_build.memory_type = qio_opi

; 依賴
lib_deps =
    espressif/esp32-camera @ ^2.0.0
    bblanchon/ArduinoJson @ ^6.21.0
    esphome/ESP32-audioI2S @ ^2.0.4
    sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library @ ^1.3.0
    mikalhart/TinyGPSPlus @ ^1.0.0
    adafruit/Adafruit NeoPixel @ ^1.12.0

; 編譯 flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DCAMERA_MODEL_XIAO_ESP32S3_SENSE

; 上傳
upload_speed = 921600
monitor_speed = 115200
