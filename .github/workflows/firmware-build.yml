name: Firmware Build

on:
  push:
    branches: [main]
    paths:
      - "include/**"
      - "src/**"
      - "platformio.ini"
      - "sdkconfig.defaults.template"
      - ".github/workflows/firmware-build.yml"
  pull_request:
    paths:
      - "include/**"
      - "src/**"
      - "platformio.ini"
      - "sdkconfig.defaults.template"
      - ".github/workflows/firmware-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build firmware
        run: pio run
